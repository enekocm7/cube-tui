[package]
name = "cube-tui"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cube"
path = "src/main.rs"

[dependencies]
ratatui = "0.30.0"
rand = "0.10.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6.0.0"
chrono = "0.4"
clap = { version = "4.5.60", features = ["derive", "color"] }
